<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tobermory Trip · Finance Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --teal:#0a7e8c;--teal-deep:#064e5a;--teal-light:#1ab8cc;
    --pine:#2d5a3d;--pine-light:#3d7a52;
    --white:#f4fbfc;--text:#0d2b30;--text-muted:#3a6470;
    --danger:#c0392b;--amber:#e67e22;--green:#27ae60;
    --card-border:#c8eef3;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Nunito',sans-serif;background:var(--white);color:var(--text);overflow-x:hidden;}

  /* HERO */
  .hero{position:relative;background:linear-gradient(180deg,#064e5a 0%,#0a7e8c 35%,#1ab8cc 65%,#5dd6e8 85%,#a8ecf5 100%);padding:52px 24px 0;text-align:center;overflow:hidden;min-height:340px;}
  .hero-water{position:absolute;bottom:0;left:0;right:0;height:160px;}
  .wave{position:absolute;width:200%;left:-50%;animation:waveMove 6s ease-in-out infinite;}
  .wave1{bottom:40px;opacity:.5;animation-duration:7s;}
  .wave2{bottom:20px;opacity:.7;animation-duration:5s;animation-delay:-2s;}
  .wave3{bottom:0;opacity:1;animation-duration:8s;animation-delay:-4s;}
  @keyframes waveMove{0%,100%{transform:translateX(0)}50%{transform:translateX(5%)}}
  .hero-pines{position:absolute;bottom:50px;left:0;right:0;}
  .hero-content{position:relative;z-index:10;padding-bottom:120px;}
  .hero h1{font-family:'Playfair Display',serif;font-size:clamp(2rem,5vw,3.2rem);color:#fff;text-shadow:0 3px 20px rgba(0,0,0,.4);margin-bottom:6px;line-height:1.2;}
  .hero-sub{font-size:.95rem;color:rgba(255,255,255,.88);font-weight:700;margin-bottom:18px;letter-spacing:.03em;}
  .hero-badges{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
  .hero-badge{background:rgba(255,255,255,.18);backdrop-filter:blur(8px);border:1.5px solid rgba(255,255,255,.4);border-radius:999px;padding:5px 14px;font-size:.78rem;font-weight:700;color:#fff;}

  /* LAYOUT */
  .container{max-width:900px;margin:0 auto;padding:0 20px 80px;}

  /* KPI STRIP */
  .kpi-strip{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin:32px 0 28px;}
  @media(max-width:640px){.kpi-strip{grid-template-columns:repeat(2,1fr);}}
  .kpi{background:#fff;border:2px solid var(--card-border);border-radius:16px;padding:16px 14px;text-align:center;box-shadow:0 2px 12px rgba(10,126,140,.07);}
  .kpi .k-label{font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--teal-deep);margin-bottom:6px;}
  .kpi .k-val{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:700;line-height:1;}
  .kpi .k-sub{font-size:.68rem;color:var(--text-muted);margin-top:4px;font-weight:600;}
  .kv-teal{color:var(--teal-deep);}
  .kv-green{color:var(--green);}
  .kv-red{color:var(--danger);}
  .kv-amber{color:var(--amber);}
  .kv-pine{color:var(--pine);}

  /* TABS */
  .tabs{display:flex;gap:6px;margin-bottom:24px;flex-wrap:wrap;}
  .tab{padding:8px 18px;border-radius:999px;font-size:.82rem;font-weight:700;cursor:pointer;border:2px solid var(--card-border);background:#fff;color:var(--text-muted);font-family:'Nunito',sans-serif;transition:all .15s;}
  .tab.active{background:var(--teal-deep);color:#fff;border-color:var(--teal-deep);}
  .tab:hover:not(.active){border-color:var(--teal);color:var(--teal-deep);}

  /* SECTION HEADER */
  .sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
  .sec-title{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;color:var(--teal-deep);}

  /* CARDS */
  .card{background:#fff;border:2px solid var(--card-border);border-radius:16px;padding:20px 22px;margin-bottom:14px;box-shadow:0 2px 12px rgba(10,126,140,.06);}
  .card-title{font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--teal-deep);margin-bottom:14px;}

  /* BUTTONS */
  .btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:999px;font-family:'Nunito',sans-serif;font-size:.82rem;font-weight:700;cursor:pointer;border:none;transition:all .15s;white-space:nowrap;}
  .btn-primary{background:var(--teal-deep);color:#fff;}
  .btn-primary:hover{background:var(--teal);transform:translateY(-1px);box-shadow:0 4px 14px rgba(10,126,140,.3);}
  .btn-ghost{background:#fff;color:var(--text-muted);border:2px solid var(--card-border);}
  .btn-ghost:hover{border-color:var(--teal);color:var(--teal-deep);}
  .btn-danger{background:rgba(192,57,43,.1);color:var(--danger);border:2px solid rgba(192,57,43,.25);}
  .btn-danger:hover{background:rgba(192,57,43,.2);}
  .btn-green{background:rgba(39,174,96,.1);color:var(--green);border:2px solid rgba(39,174,96,.3);}
  .btn-green:hover{background:rgba(39,174,96,.2);}
  .btn-sm{padding:5px 14px;font-size:.75rem;}
  .btn-pine{background:var(--pine);color:#fff;}
  .btn-pine:hover{background:var(--pine-light);}

  /* EXPENSE ROW */
  .exp-row{display:flex;align-items:flex-start;justify-content:space-between;padding:14px 0;border-bottom:1.5px solid #e0f0f5;gap:12px;}
  .exp-row:last-child{border-bottom:none;}
  .exp-icon{width:40px;height:40px;border-radius:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;background:#e6f7fa;border:1.5px solid var(--card-border);}
  .exp-body{flex:1;min-width:0;}
  .exp-name{font-weight:800;font-size:.9rem;margin-bottom:3px;color:var(--text);}
  .exp-meta{font-size:.75rem;color:var(--text-muted);line-height:1.7;font-weight:600;}
  .exp-tag{display:inline-block;padding:2px 8px;border-radius:999px;font-size:.65rem;font-weight:800;background:#d0f0f5;color:var(--teal-deep);margin-left:6px;}
  .exp-right{text-align:right;flex-shrink:0;}
  .exp-amt{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;color:var(--teal-deep);}
  .exp-per{font-size:.68rem;color:var(--text-muted);margin-top:2px;font-weight:600;}

  /* BAL ROW */
  .bal-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1.5px solid #e0f0f5;}
  .bal-row:last-child{border-bottom:none;}
  .bal-name{font-size:.82rem;font-weight:700;min-width:80px;color:var(--text);}
  .bar-wrap{flex:1;height:7px;background:#e0f0f5;border-radius:4px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:4px;transition:width .5s;}
  .bal-num{font-family:'Playfair Display',serif;font-weight:700;font-size:.9rem;min-width:70px;text-align:right;}

  /* SETTLE ROW */
  .settle-row{display:flex;align-items:center;gap:10px;background:#f0fafc;border:2px solid var(--card-border);border-radius:12px;padding:14px 16px;margin-bottom:10px;flex-wrap:wrap;}
  .settle-from{font-weight:800;font-size:.9rem;color:var(--text);}
  .settle-arrow{color:var(--amber);font-size:15px;font-weight:800;}
  .settle-to{font-weight:800;font-size:.9rem;color:var(--teal-deep);}
  .settle-amt{margin-left:auto;font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;color:var(--pine);padding-right:10px;}
  .badge-done{padding:4px 12px;border-radius:999px;font-size:.7rem;font-weight:800;background:#d0f0e0;color:var(--pine);border:2px solid #b3d9be;}

  /* PILLS */
  .pills{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:18px;}
  .pill{padding:5px 14px;border-radius:999px;font-size:.75rem;font-weight:700;border:2px solid var(--card-border);background:#fff;cursor:pointer;color:var(--text-muted);transition:all .14s;}
  .pill.active{background:var(--teal-deep);border-color:var(--teal-deep);color:#fff;}
  .pill:hover:not(.active){border-color:var(--teal);color:var(--teal-deep);}

  /* FORM */
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  @media(max-width:520px){.form-grid{grid-template-columns:1fr;}}
  .fg{display:flex;flex-direction:column;gap:5px;}
  .fg.full{grid-column:1/-1;}
  .fg label{font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--teal-deep);}
  input,select,textarea{background:#f4fbfc;border:2px solid var(--card-border);border-radius:10px;padding:10px 13px;color:var(--text);font-family:'Nunito',sans-serif;font-size:.85rem;font-weight:600;transition:border-color .14s;outline:none;width:100%;}
  input:focus,select:focus,textarea:focus{border-color:var(--teal);background:#fff;}
  select option{background:#fff;}
  textarea{resize:vertical;min-height:68px;}
  .check-group{display:flex;flex-wrap:wrap;gap:7px;}
  .check-chip{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:999px;border:2px solid var(--card-border);background:#fff;cursor:pointer;font-size:.75rem;font-weight:700;transition:all .13s;user-select:none;color:var(--text-muted);}
  .check-chip:hover{border-color:var(--teal);}
  .check-chip.on{background:#d0f0f5;border-color:var(--teal-deep);color:var(--teal-deep);}
  .check-chip input{display:none;}

  /* MODAL */
  .overlay{position:fixed;inset:0;background:rgba(6,78,90,.55);backdrop-filter:blur(6px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;}
  .modal{background:#fff;border:2px solid var(--card-border);border-radius:20px;padding:28px 26px;max-width:560px;width:100%;max-height:90vh;overflow-y:auto;animation:rise .2s cubic-bezier(.2,.8,.4,1);box-shadow:0 20px 60px rgba(6,78,90,.2);}
  @keyframes rise{from{transform:translateY(16px) scale(.98);opacity:0;}}
  .modal-hd{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;color:var(--teal-deep);margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;}
  .x-btn{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:20px;line-height:1;padding:2px 6px;border-radius:6px;font-family:'Nunito',sans-serif;}
  .x-btn:hover{background:#e6f7fa;color:var(--teal-deep);}

  /* SIGN IN */
  .signin-wrap{display:flex;align-items:center;justify-content:center;min-height:60vh;}
  .signin-box{background:#fff;border:2px solid var(--card-border);border-radius:24px;padding:48px 40px;max-width:400px;width:100%;text-align:center;box-shadow:0 16px 48px rgba(6,78,90,.12);}
  @media(max-width:460px){.signin-box{padding:32px 22px;}}
  .signin-boat{font-size:56px;margin-bottom:6px;display:block;}
  .signin-title{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:700;color:var(--teal-deep);margin-bottom:8px;}
  .signin-sub{color:var(--text-muted);font-size:.85rem;line-height:1.7;margin-bottom:28px;font-weight:600;}
  .google-btn{display:flex;align-items:center;gap:12px;padding:13px 22px;border-radius:12px;background:#fff;color:#1a1a1a;border:2px solid #e0e0e0;font-family:'Nunito',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer;width:100%;justify-content:center;transition:all .16s;box-shadow:0 2px 10px rgba(0,0,0,.1);}
  .google-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.15);border-color:#bbb;}
  .g-logo{width:20px;height:20px;flex-shrink:0;}

  /* PENDING SCREEN */
  .pending-wrap{display:flex;align-items:center;justify-content:center;min-height:60vh;}
  .pending-box{background:#fff;border:2px solid #fde8cc;border-radius:24px;padding:44px 36px;max-width:400px;width:100%;text-align:center;box-shadow:0 12px 40px rgba(6,78,90,.1);}
  .pending-icon{font-size:52px;margin-bottom:10px;display:block;}
  .pending-title{font-family:'Playfair Display',serif;font-size:1.5rem;color:var(--amber);margin-bottom:8px;}
  .pending-sub{color:var(--text-muted);font-size:.85rem;line-height:1.7;font-weight:600;}

  /* HEADER */
  .site-header{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;background:#fff;border-bottom:2px solid var(--card-border);position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(10,126,140,.07);}
  .site-logo{display:flex;align-items:center;gap:10px;}
  .site-logo-mark{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,#064e5a,#0a7e8c);display:flex;align-items:center;justify-content:center;font-size:18px;}
  .site-logo h1{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;color:var(--teal-deep);}
  .site-logo h1 span{color:var(--teal-light);}
  #auth-bar{display:flex;align-items:center;gap:8px;}
  .user-chip{display:flex;align-items:center;gap:7px;background:#e6f7fa;border:2px solid var(--card-border);border-radius:999px;padding:4px 12px 4px 5px;}
  .avatar{width:28px;height:28px;border-radius:50%;border:2px solid var(--teal);object-fit:cover;}
  .user-chip span{font-size:.78rem;font-weight:700;color:var(--teal-deep);}
  .admin-badge{font-size:.62rem;background:var(--teal-deep);color:#fff;padding:2px 7px;border-radius:999px;font-weight:800;}

  /* MEMBER CARD */
  .member-card{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1.5px solid #e0f0f5;gap:12px;}
  .member-card:last-child{border-bottom:none;}
  .member-left{display:flex;align-items:center;gap:10px;}
  .member-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#e6f7fa,#b3e8f0);border:2px solid var(--card-border);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
  .member-name{font-weight:800;font-size:.88rem;color:var(--text);}
  .member-email{font-size:.7rem;color:var(--text-muted);font-weight:600;}
  .role-badge{font-size:.62rem;font-weight:800;padding:2px 8px;border-radius:999px;}
  .role-admin{background:var(--teal-deep);color:#fff;}
  .role-member{background:#d0f0f5;color:var(--teal-deep);}
  .role-pending{background:#fde8cc;color:var(--amber);}

  /* EMPTY */
  .empty{text-align:center;padding:40px 20px;color:var(--text-muted);}
  .empty-icon{font-size:40px;margin-bottom:10px;}
  .empty p{font-size:.88rem;font-weight:600;}

  /* TOAST */
  #toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--teal-deep);color:#fff;padding:11px 22px;border-radius:999px;font-size:.82rem;font-weight:700;z-index:999;opacity:0;transition:opacity .2s;pointer-events:none;box-shadow:0 4px 18px rgba(6,78,90,.35);font-family:'Nunito',sans-serif;}
  #toast.show{opacity:1;}

  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
  @media(max-width:640px){.two-col{grid-template-columns:1fr;}}
  .divider{height:1.5px;background:#e0f0f5;margin:16px 0;}
  .info-note{background:#e6f7fa;border:2px solid var(--card-border);border-radius:12px;padding:12px 16px;font-size:.78rem;color:var(--teal-deep);font-weight:700;margin-bottom:16px;line-height:1.6;}
</style>
</head>
<body>

<div id="toast"></div>

<!-- STICKY HEADER -->
<div class="site-header">
  <div class="site-logo">
    <div class="site-logo-mark">⛵</div>
    <h1>Tobermory <span>Splits</span></h1>
  </div>
  <div id="auth-bar"><span style="color:var(--text-muted);font-size:.82rem;font-weight:600;">Loading…</span></div>
</div>

<!-- HERO -->
<div class="hero">
  <div class="hero-content">
    <h1>Trip Finance Tracker</h1>
    <div class="hero-sub">Tobermory · May 2026 · Split every expense fairly ⚖️</div>
    <div class="hero-badges">
      <span class="hero-badge">💸 Expense Splitting</span>
      <span class="hero-badge">🔄 Auto Settlement</span>
      <span class="hero-badge">🏝️ Activity Groups</span>
      <span class="hero-badge">👥 Group Tracking</span>
    </div>
  </div>
  <div class="hero-pines">
    <svg viewBox="0 0 1200 100" preserveAspectRatio="none" style="width:100%;height:70px;display:block;">
      <polygon points="30,100 50,40 70,100" fill="#1a4a2a" opacity=".9"/>
      <polygon points="42,100 62,18 82,100" fill="#2d5a3d" opacity=".95"/>
      <polygon points="68,100 88,48 108,100" fill="#1a4a2a" opacity=".85"/>
      <polygon points="82,100 105,28 128,100" fill="#2d5a3d" opacity=".9"/>
      <polygon points="900,100 920,35 940,100" fill="#1a4a2a" opacity=".9"/>
      <polygon points="922,100 948,16 972,100" fill="#2d5a3d" opacity=".95"/>
      <polygon points="958,100 978,42 998,100" fill="#1a4a2a" opacity=".85"/>
      <polygon points="982,100 1008,26 1032,100" fill="#2d5a3d" opacity=".9"/>
      <polygon points="1042,100 1068,20 1094,100" fill="#2d5a3d" opacity=".95"/>
    </svg>
  </div>
  <div class="hero-water">
    <svg class="wave wave1" viewBox="0 0 1440 80"><path d="M0,40 C180,10 360,70 540,40 C720,10 900,70 1080,40 C1260,10 1440,50 1440,40 L1440,80 L0,80 Z" fill="rgba(255,255,255,.15)"/></svg>
    <svg class="wave wave2" viewBox="0 0 1440 80"><path d="M0,50 C200,20 400,80 600,50 C800,20 1000,80 1200,50 C1350,30 1440,60 1440,50 L1440,80 L0,80 Z" fill="rgba(255,255,255,.25)"/></svg>
    <svg class="wave wave3" viewBox="0 0 1440 80"><path d="M0,55 C240,25 480,85 720,55 C960,25 1200,75 1440,55 L1440,80 L0,80 Z" fill="#f4fbfc"/></svg>
  </div>
</div>

<div class="container">
  <div id="main"></div>
</div>

<script type="module">
import { initializeApp }   from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
                           from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

// ══════════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════════
const FB = {
  apiKey:            "AIzaSyBHtdnCt4xtSuezt3p5vrTqMPEZRRIX2UQ",
  authDomain:        "trip-expense-tracker-4bb2f.firebaseapp.com",
  projectId:         "trip-expense-tracker-4bb2f",
  storageBucket:     "trip-expense-tracker-4bb2f.firebasestorage.app",
  messagingSenderId: "585256105192",
  appId:             "1:585256105192:web:ed2d38a97fe81d064c055d"
};
const GH_TOKEN = "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";
const GH_OWNER = "code-manigopal";
const GH_REPO  = "code-manigopal.github.io";
const GH_PATH  = "tobermory-tracker-data/trips.json";
const ADMIN_EMAIL = "manikandangopal97@gmail.com";

// ══════════════════════════════════════════
//  ACTIVITY DEFAULTS & ICONS
// ══════════════════════════════════════════
const DEF_ACTS = ["Shared (All)","Flowerpot Island","Scuba Diving","Kayaking","Accommodation","Food & Drinks","Transportation"];
const ICONS    = {"Shared (All)":"🏕️","Flowerpot Island":"🌺","Scuba Diving":"🤿","Kayaking":"🚣","Accommodation":"🏠","Food & Drinks":"🍽️","Transportation":"🚗"};

// ══════════════════════════════════════════
//  FIREBASE
// ══════════════════════════════════════════
const fbApp    = initializeApp(FB);
const auth     = getAuth(fbApp);
const provider = new GoogleAuthProvider();

// ══════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════
let user   = null;
let data   = { expenses:[], activities:[...DEF_ACTS], members:[], settled:[] };
let tab    = "dashboard";
let actFil = "All";
let modal  = null;
let ghSHA  = null;

const isAdmin = () => user && user.email === ADMIN_EMAIL;
const getMe   = () => data.members.find(m => m.email === user?.email);
const isApproved = () => {
  if (!user) return false;
  if (isAdmin()) return true;
  const me = getMe();
  return me && me.status === "approved";
};
const isPending = () => {
  if (!user || isAdmin()) return false;
  const me = getMe();
  return me && me.status === "pending";
};

// ══════════════════════════════════════════
//  GITHUB
// ══════════════════════════════════════════
async function ghLoad() {
  try {
    const r = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_PATH}`,
      { headers:{ Authorization:`token ${GH_TOKEN}` } });
    if (r.ok) {
      const j = await r.json();
      ghSHA = j.sha;
      const d2 = JSON.parse(atob(j.content.replace(/\n/g,'')));
      data = { expenses:[], activities:[...DEF_ACTS], members:[], settled:[], ...d2 };
    }
  } catch(e) { console.warn(e); }
  // auto-enroll new user
  if (user && !isAdmin()) {
    const exists = data.members.find(m=>m.email===user.email);
    if (!exists) {
      data.members.push({ id:Date.now().toString(), name:user.displayName||user.email, email:user.email, photo:user.photoURL||"", status:"pending", joinedAt:new Date().toISOString() });
      await ghSave(false);
    }
  }
  render();
}

async function ghSave(showMsg=true) {
  const content = btoa(unescape(encodeURIComponent(JSON.stringify(data,null,2))));
  const body = { message:"Update Tobermory trip data", content };
  if (ghSHA) body.sha = ghSHA;
  try {
    const r = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_PATH}`,
      { method:"PUT", headers:{ Authorization:`token ${GH_TOKEN}`, "Content-Type":"application/json" }, body:JSON.stringify(body) });
    if (r.ok) { const j=await r.json(); ghSHA=j.content.sha; if(showMsg) toast("Saved ✓"); }
    else { if(showMsg) toast("Save failed"); }
  } catch(e) { if(showMsg) toast("Save error"); }
}

// ══════════════════════════════════════════
//  SETTLEMENT
// ══════════════════════════════════════════
function settle(expenses) {
  const names = approvedNames();
  const bal = {}; names.forEach(n=>bal[n]=0);
  expenses.forEach(e=>{
    const pp=e.participants||names;
    const sh=e.amount/pp.length;
    bal[e.paidBy]=(bal[e.paidBy]||0)+e.amount;
    pp.forEach(p=>bal[p]=(bal[p]||0)-sh);
  });
  const cr=[],dr=[];
  Object.entries(bal).forEach(([n,b])=>{ if(b>.01)cr.push({n,b}); else if(b<-.01)dr.push({n,b:-b}); });
  cr.sort((a,b)=>b.b-a.b); dr.sort((a,b)=>b.b-a.b);
  const txns=[]; let i=0,j=0;
  while(i<cr.length&&j<dr.length){
    const c=cr[i],d=dr[j],a=Math.min(c.b,d.b);
    txns.push({from:d.n,to:c.n,amount:+a.toFixed(2)});
    c.b-=a; d.b-=a; if(c.b<.01)i++; if(d.b<.01)j++;
  }
  return txns;
}

function netBal(name, expenses) {
  let b=0;
  expenses.forEach(e=>{
    const pp=e.participants||approvedNames();
    if(e.paidBy===name) b+=e.amount;
    if(pp.includes(name)) b-=e.amount/pp.length;
  });
  return +b.toFixed(2);
}

function approvedNames() {
  const names = data.members.filter(m=>m.status==="approved").map(m=>m.name);
  if (isAdmin() && !names.includes(user.displayName||user.email)) names.unshift(user.displayName||user.email);
  return names;
}

// ══════════════════════════════════════════
//  BIND
// ══════════════════════════════════════════
function bindAuth() {
  document.getElementById("b-gsi")?.addEventListener("click",()=>
    signInWithPopup(auth,provider).catch(e=>{ console.error(e); toast("Sign-in error: "+e.code); }));
}

function bind() {
  document.querySelectorAll(".tab").forEach(t=>t.addEventListener("click",()=>{ tab=t.dataset.tab; render(); }));
  document.querySelectorAll("[data-af]").forEach(p=>p.addEventListener("click",()=>{ actFil=p.dataset.af; render(); }));
  document.getElementById("b-addexp")?.addEventListener("click",()=>{ modal="expense"; render(); });
  document.getElementById("b-addact")?.addEventListener("click",()=>{ modal="activity"; render(); });
  document.getElementById("b-close")?.addEventListener("click",()=>{ modal=null; render(); });
  document.getElementById("ov")?.addEventListener("click",e=>{ if(e.target.id==="ov"){ modal=null; render(); } });

  document.querySelectorAll(".check-chip[data-m]").forEach(c=>{
    c.addEventListener("click",()=>{ c.classList.toggle("on"); c.querySelector("input").checked=c.classList.contains("on"); });
  });

  document.getElementById("b-saveexp")?.addEventListener("click",()=>{
    const desc=document.getElementById("e-desc").value.trim();
    const amt=parseFloat(document.getElementById("e-amt").value);
    const date=document.getElementById("e-date").value;
    const paid=document.getElementById("e-paid").value;
    const act=document.getElementById("e-act").value;
    const notes=document.getElementById("e-notes").value.trim();
    const pp=[...document.querySelectorAll(".check-chip.on")].map(c=>c.dataset.m);
    if(!desc||isNaN(amt)||amt<=0){ toast("Enter description and amount"); return; }
    if(!pp.length){ toast("Select at least one participant"); return; }
    data.expenses.push({ id:Date.now().toString(), description:desc, amount:amt, date, paidBy:paid, activity:act, notes, participants:pp });
    modal=null; ghSave().then(()=>render());
  });

  document.getElementById("b-saveact")?.addEventListener("click",()=>{
    const n=document.getElementById("a-name").value.trim();
    if(!n){ toast("Enter activity name"); return; }
    if(!data.activities.includes(n)) data.activities.push(n);
    modal=null; ghSave().then(()=>render());
  });

  document.querySelectorAll("[data-del]").forEach(b=>b.addEventListener("click",()=>{
    data.expenses=data.expenses.filter(e=>e.id!==b.dataset.del);
    ghSave().then(()=>render());
  }));

  document.querySelectorAll("[data-settle]").forEach(b=>b.addEventListener("click",()=>{
    if(!data.settled) data.settled=[];
    data.settled.push(b.dataset.settle);
    ghSave().then(()=>render());
  }));

  document.querySelectorAll("[data-approve]").forEach(b=>b.addEventListener("click",()=>{
    const m=data.members.find(x=>x.id===b.dataset.approve);
    if(m){ m.status="approved"; ghSave().then(()=>render()); }
  }));

  document.querySelectorAll("[data-kick]").forEach(b=>b.addEventListener("click",()=>{
    data.members=data.members.filter(x=>x.id!==b.dataset.kick);
    ghSave().then(()=>render());
  }));

  document.getElementById("b-out2")?.addEventListener("click",()=>signOut(auth));
}

// ══════════════════════════════════════════
//  AUTH
// ══════════════════════════════════════════
onAuthStateChanged(auth, u => {
  user=u;
  if(u) ghLoad();
  else render();
});
</script>
