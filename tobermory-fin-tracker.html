<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tobermory Trip Tracker ⛵</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --teal:#0D9E8A;--teal-lt:#14C4A8;--teal-dk:#0a7a6b;
      --navy:#070E1A;--navy2:#0C1626;--navy3:#111E30;
      --card:#152032;--card2:#1A2840;
      --border:#243450;--border2:#1E2E44;
      --text:#E2EDF8;--muted:#607A96;
      --danger:#E05555;--amber:#F0A020;--green:#3DB874;--purple:#7C6EF5;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:var(--navy);color:var(--text);min-height:100vh;overflow-x:hidden}
    body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
      background:radial-gradient(ellipse 70% 50% at 15% 5%,rgba(13,158,138,.10) 0%,transparent 55%),
                 radial-gradient(ellipse 50% 40% at 85% 90%,rgba(124,110,245,.06) 0%,transparent 55%)}
    #app{position:relative;z-index:1;max-width:1080px;margin:0 auto;padding:0 20px 100px}

    /* HEADER */
    header{display:flex;align-items:center;justify-content:space-between;padding:24px 0 20px;border-bottom:1px solid var(--border2);margin-bottom:32px;gap:12px}
    .logo{display:flex;align-items:center;gap:13px}
    .logo-mark{width:44px;height:44px;border-radius:14px;flex-shrink:0;background:linear-gradient(145deg,var(--teal),var(--teal-dk));display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 0 0 1px rgba(20,196,168,.25),0 4px 16px rgba(13,158,138,.3)}
    .logo h1{font-family:'Syne',sans-serif;font-size:19px;font-weight:800;letter-spacing:-.4px}
    .logo h1 span{color:var(--teal-lt)}
    .logo p{font-size:12px;color:var(--muted);margin-top:2px}
    #auth-bar{display:flex;align-items:center;gap:10px;flex-shrink:0}
    .avatar{width:34px;height:34px;border-radius:50%;border:2px solid var(--teal);object-fit:cover}
    .user-chip{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:30px;padding:5px 14px 5px 6px}
    .user-chip span{font-size:13px;font-weight:500}

    /* BUTTONS */
    .btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;border:none;transition:all .16s;white-space:nowrap}
    .btn-primary{background:var(--teal);color:#fff}
    .btn-primary:hover{background:var(--teal-lt);transform:translateY(-1px);box-shadow:0 4px 14px rgba(13,158,138,.35)}
    .btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
    .btn-ghost:hover{border-color:var(--teal);color:var(--teal-lt)}
    .btn-danger{background:rgba(224,85,85,.12);color:var(--danger);border:1px solid rgba(224,85,85,.25)}
    .btn-danger:hover{background:rgba(224,85,85,.22)}
    .btn-sm{padding:6px 13px;font-size:13px;border-radius:8px}

    /* TABS */
    .tabs-wrap{display:flex;gap:4px;margin-bottom:28px;flex-wrap:wrap}
    .tab{display:flex;align-items:center;gap:6px;padding:9px 18px;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;transition:all .14s}
    .tab.active{background:var(--teal);color:#fff;border-color:var(--teal);box-shadow:0 3px 12px rgba(13,158,138,.3)}
    .tab:hover:not(.active){border-color:var(--border);color:var(--text);background:var(--card)}

    /* KPI GRID */
    .kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:28px}
    @media(max-width:700px){.kpi-grid{grid-template-columns:repeat(2,1fr)}}
    .kpi{background:var(--card);border:1px solid var(--border2);border-radius:14px;padding:18px 18px 16px;position:relative;overflow:hidden}
    .kpi::after{content:attr(data-icon);position:absolute;right:12px;top:12px;font-size:22px;opacity:.18}
    .k-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:7px}
    .k-val{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;line-height:1}
    .k-sub{font-size:12px;color:var(--muted);margin-top:5px}
    .k-teal{color:var(--teal-lt)}.k-green{color:var(--green)}.k-red{color:var(--danger)}.k-amber{color:var(--amber)}.k-purple{color:var(--purple)}

    /* CARDS */
    .card{background:var(--card);border:1px solid var(--border2);border-radius:16px;padding:22px 24px;margin-bottom:16px}
    .card-hd{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between}

    /* TWO COL */
    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
    @media(max-width:680px){.two-col{grid-template-columns:1fr}}

    /* EXPENSE ROW */
    .exp-row{display:flex;align-items:flex-start;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border2);gap:12px}
    .exp-row:last-child{border-bottom:none}
    .exp-icon{width:40px;height:40px;border-radius:11px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:19px;background:linear-gradient(135deg,rgba(13,158,138,.18),rgba(13,158,138,.06));border:1px solid rgba(13,158,138,.2)}
    .exp-body{flex:1;min-width:0}
    .exp-name{font-weight:600;font-size:15px;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .exp-meta{font-size:12px;color:var(--muted);line-height:1.7}
    .exp-tag{display:inline-block;padding:2px 8px;border-radius:5px;font-size:11px;font-weight:600;background:rgba(240,160,32,.14);color:var(--amber);margin-left:7px;vertical-align:middle}
    .exp-right{text-align:right;flex-shrink:0}
    .exp-amount{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--teal-lt)}
    .exp-per{font-size:11px;color:var(--muted);margin-top:2px}

    /* BAL ROW */
    .bal-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--border2)}
    .bal-row:last-child{border-bottom:none}
    .bal-name{font-size:14px;font-weight:500;min-width:80px}
    .bar-wrap{flex:1;height:6px;background:var(--border2);border-radius:4px;overflow:hidden}
    .bar-fill{height:100%;border-radius:4px;transition:width .5s}
    .bal-num{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;min-width:72px;text-align:right}

    /* SETTLE */
    .settle-row{display:flex;align-items:center;gap:10px;background:var(--navy3);border:1px solid var(--border2);border-radius:12px;padding:14px 16px;margin-bottom:10px;flex-wrap:wrap}
    .settle-from{font-weight:600;font-size:15px}
    .settle-arrow{color:var(--amber);font-size:16px}
    .settle-to{font-weight:600;font-size:15px;color:var(--teal-lt)}
    .settle-amt{margin-left:auto;font-family:'Syne',sans-serif;font-size:19px;font-weight:800;color:var(--green);padding-right:12px}
    .badge-done{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;background:rgba(61,184,116,.15);color:var(--green);border:1px solid rgba(61,184,116,.3)}

    /* PILLS */
    .pills{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
    .pill{padding:6px 14px;border-radius:20px;font-size:13px;font-weight:500;border:1px solid var(--border2);background:var(--navy3);cursor:pointer;color:var(--muted);transition:all .14s}
    .pill.active{background:rgba(13,158,138,.18);border-color:var(--teal);color:var(--teal-lt)}
    .pill:hover:not(.active){border-color:var(--border);color:var(--text)}

    /* FORM */
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    @media(max-width:520px){.form-grid{grid-template-columns:1fr}}
    .fg{display:flex;flex-direction:column;gap:6px}
    .fg.full{grid-column:1/-1}
    .fg label{font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
    input,select,textarea{background:var(--navy2);border:1px solid var(--border);border-radius:9px;padding:10px 13px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;transition:border-color .14s;outline:none;width:100%}
    input:focus,select:focus,textarea:focus{border-color:var(--teal);background:var(--navy3)}
    select option{background:var(--navy2)}
    textarea{resize:vertical;min-height:70px}
    .check-group{display:flex;flex-wrap:wrap;gap:7px}
    .check-chip{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:var(--navy2);cursor:pointer;font-size:13px;font-weight:500;transition:all .13s;user-select:none}
    .check-chip:hover{border-color:var(--teal)}
    .check-chip.on{background:rgba(13,158,138,.18);border-color:var(--teal);color:var(--teal-lt)}
    .check-chip input{display:none}

    /* MODAL */
    .overlay{position:fixed;inset:0;background:rgba(4,9,18,.8);backdrop-filter:blur(8px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
    .modal{background:var(--navy2);border:1px solid var(--border);border-radius:20px;padding:28px 26px;max-width:560px;width:100%;max-height:90vh;overflow-y:auto;animation:rise .2s cubic-bezier(.2,.8,.4,1)}
    @keyframes rise{from{transform:translateY(18px) scale(.98);opacity:0}}
    .modal-hd{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;margin-bottom:22px;display:flex;align-items:center;justify-content:space-between}
    .x-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:20px;line-height:1;padding:2px 6px;border-radius:6px}
    .x-btn:hover{background:var(--card);color:var(--text)}

    /* SIGN IN */
    .signin-wrap{display:flex;align-items:center;justify-content:center;min-height:78vh}
    .signin-box{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:52px 44px;max-width:420px;width:100%;text-align:center;box-shadow:0 24px 60px rgba(0,0,0,.5)}
    @media(max-width:480px){.signin-box{padding:36px 24px}}
    .signin-boat{font-size:64px;margin-bottom:4px;display:block}
    .signin-title{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;margin-bottom:8px}
    .signin-sub{color:var(--muted);font-size:15px;line-height:1.65;margin-bottom:34px}
    .google-btn{display:flex;align-items:center;gap:14px;padding:14px 24px;border-radius:12px;background:#fff;color:#1a1a1a;border:none;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;width:100%;justify-content:center;transition:all .18s;box-shadow:0 2px 12px rgba(0,0,0,.3)}
    .google-btn:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(0,0,0,.4)}
    .g-logo{width:22px;height:22px;flex-shrink:0}

    /* EMPTY */
    .empty{text-align:center;padding:44px 20px;color:var(--muted)}
    .empty-icon{font-size:42px;margin-bottom:12px}
    .empty p{font-size:15px}

    /* TOAST */
    #toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--teal);color:#fff;padding:12px 24px;border-radius:12px;font-size:14px;font-weight:500;z-index:999;opacity:0;transition:opacity .2s;pointer-events:none;box-shadow:0 4px 20px rgba(13,158,138,.4)}
    #toast.show{opacity:1}

    .sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
    .sec-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:800}
    .divider{height:1px;background:var(--border2);margin:16px 0}
  </style>
</head>
<body>
<div id="toast"></div>
<div id="app">
  <header>
    <div class="logo">
      <div class="logo-mark">⛵</div>
      <div>
        <h1>Tobermory <span>Splits</span></h1>
        <p>Trip expense tracker</p>
      </div>
    </div>
    <div id="auth-bar"><span style="color:var(--muted);font-size:13px">Loading…</span></div>
  </header>
  <div id="main"></div>
</div>

<script type="module">
import { initializeApp }                                          from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
                                                                  from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

// ════════════════════════════════════════════
//  CONFIG — fill in GITHUB_TOKEN after regenerating
// ════════════════════════════════════════════
const FB = {
  apiKey:            "AIzaSyBHtdnCt4xtSuezt3p5vrTqMPEZRRIX2UQ",
  authDomain:        "trip-expense-tracker-4bb2f.firebaseapp.com",
  projectId:         "trip-expense-tracker-4bb2f",
  storageBucket:     "trip-expense-tracker-4bb2f.firebasestorage.app",
  messagingSenderId: "585256105192",
  appId:             "1:585256105192:web:ed2d38a97fe81d064c055d"
};
const GH_TOKEN = "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";   // ← paste new token here
const GH_OWNER = "code-manigopal";
const GH_REPO  = "code-manigopal.github.io";
const GH_PATH  = "tobermory-tracker-data/trips.json";

// ════════════════════════════════════════════
//  TRIP DEFAULTS  — edit names before trip
// ════════════════════════════════════════════
const DEF_MEMBERS = ["Mani","Spouse","Friend 1","Friend 2","Friend 3"];
const DEF_ACTS    = ["Shared (All)","Flowerpot Island","Scuba Diving","Kayaking","Accommodation","Food & Drinks","Transportation"];
const ICONS       = {"Shared (All)":"🏕️","Flowerpot Island":"🌺","Scuba Diving":"🤿","Kayaking":"🚣","Accommodation":"🏠","Food & Drinks":"🍽️","Transportation":"🚗"};

// ════════════════════════════════════════════
//  FIREBASE
// ════════════════════════════════════════════
const app      = initializeApp(FB);
const auth     = getAuth(app);
const provider = new GoogleAuthProvider();

// ════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════
let user   = null;
let data   = { expenses:[], activities:[...DEF_ACTS], members:[...DEF_MEMBERS], settled:[] };
let tab    = "dashboard";
let actFil = "All";
let modal  = null;   // null | "expense" | "activity" | "member"
let ghSHA  = null;
const hasToken = GH_TOKEN !== "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";

// ════════════════════════════════════════════
//  GITHUB
// ════════════════════════════════════════════
async function ghLoad() {
  if (!hasToken) { render(); return; }
  try {
    const r = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_PATH}`,
      { headers:{ Authorization:`token ${GH_TOKEN}` } });
    if (r.ok) {
      const j = await r.json();
      ghSHA = j.sha;
      const d2 = JSON.parse(atob(j.content.replace(/\n/g,'')));
      data = { ...data, ...d2 };
    }
  } catch(e) { console.warn(e); }
  render();
}

async function ghSave() {
  if (!hasToken) { toast("Add GitHub token to enable saving"); return; }
  const content = btoa(unescape(encodeURIComponent(JSON.stringify(data,null,2))));
  const body = { message:"Update Tobermory trip data", content };
  if (ghSHA) body.sha = ghSHA;
  try {
    const r = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_PATH}`,
      { method:"PUT", headers:{ Authorization:`token ${GH_TOKEN}`, "Content-Type":"application/json" }, body:JSON.stringify(body) });
    if (r.ok) { const j = await r.json(); ghSHA = j.content.sha; toast("Saved ✓"); }
    else toast("Save failed — check token");
  } catch(e) { toast("Save error"); }
}

// ════════════════════════════════════════════
//  SETTLEMENT ALGORITHM
// ════════════════════════════════════════════
function settle(expenses) {
  const bal = {};
  data.members.forEach(m => bal[m] = 0);
  expenses.forEach(e => {
    const pp = e.participants || data.members;
    const sh = e.amount / pp.length;
    bal[e.paidBy] = (bal[e.paidBy]||0) + e.amount;
    pp.forEach(p => bal[p] = (bal[p]||0) - sh);
  });
  const cr = [], dr = [];
  Object.entries(bal).forEach(([n,b]) => {
    if (b > .01) cr.push({n, b});
    else if (b < -.01) dr.push({n, b:-b});
  });
  cr.sort((a,b)=>b.b-a.b); dr.sort((a,b)=>b.b-a.b);
  const txns = [];
  let i=0,j=0;
  while(i<cr.length && j<dr.length){
    const c=cr[i],d=dr[j], a=Math.min(c.b,d.b);
    txns.push({from:d.n, to:c.n, amount:+a.toFixed(2)});
    c.b-=a; d.b-=a;
    if(c.b<.01)i++; if(d.b<.01)j++;
  }
  return txns;
}

function netBal(m, expenses) {
  let b=0;
  expenses.forEach(e => {
    const pp = e.participants || data.members;
    if(e.paidBy===m) b+=e.amount;
    if(pp.includes(m)) b-=e.amount/pp.length;
  });
  return +b.toFixed(2);
}

// ════════════════════════════════════════════
//  TOAST
// ════════════════════════════════════════════
function toast(msg) {
  const t=document.getElementById("toast");
  t.textContent=msg; t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2600);
}

// ════════════════════════════════════════════
//  RENDER
// ════════════════════════════════════════════
function render() {
  const mc = document.getElementById("main");
  if (!user) { mc.innerHTML = rSignIn(); bindAuth(); return; }
  mc.innerHTML = rKPI() + rTabs()
    + (tab==="dashboard"    ? rDash()    : "")
    + (tab==="expenses"     ? rExpenses(): "")
    + (tab==="settlements"  ? rSettle()  : "")
    + (tab==="members"      ? rMembers() : "")
    + (modal==="expense"    ? rExpModal(): "")
    + (modal==="activity"   ? rActModal(): "")
    + (modal==="member"     ? rMemModal(): "");
  bind();
  rAuthBar();
}

// ── AUTH BAR ──
function rAuthBar() {
  const bar = document.getElementById("auth-bar");
  if (user) {
    bar.innerHTML = `<div class="user-chip">
      <img class="avatar" src="${user.photoURL||''}" onerror="this.style.display='none'"/>
      <span>${user.displayName||user.email}</span>
    </div>
    <button class="btn btn-ghost btn-sm" id="b-out">Sign out</button>`;
  } else {
    bar.innerHTML = `<button class="btn btn-primary btn-sm" id="b-in-hdr">Sign in</button>`;
  }
}

// ── SIGN IN ──
function rSignIn() {
  return `<div class="signin-wrap"><div class="signin-box">
    <span class="signin-boat">⛵</span>
    <div class="signin-title">Tobermory Splits</div>
    <p class="signin-sub">Track & split every expense for the trip.<br>Sign in to get started.</p>
    <button class="google-btn" id="b-gsi">
      <svg class="g-logo" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Sign in with Google
    </button>
  </div></div>`;
}

// ── KPI ──
function rKPI() {
  const total = data.expenses.reduce((s,e)=>s+e.amount,0);
  const me    = user?.displayName || user?.email || "";
  const myPaid= data.expenses.filter(e=>e.paidBy===me).reduce((s,e)=>s+e.amount,0);
  const myBal = netBal(me, data.expenses);
  const txns  = settle(data.expenses);
  const pend  = txns.filter(t=>!(data.settled||[]).includes(t.from+">"+t.to)).length;
  return `<div class="kpi-grid">
    <div class="kpi" data-icon="💰"><div class="k-label">Total Spent</div><div class="k-val k-teal">$${total.toFixed(2)}</div><div class="k-sub">${data.expenses.length} expenses</div></div>
    <div class="kpi" data-icon="🧾"><div class="k-label">You Paid</div><div class="k-val">$${myPaid.toFixed(2)}</div><div class="k-sub">across all activities</div></div>
    <div class="kpi" data-icon="⚖️"><div class="k-label">Your Balance</div><div class="k-val ${myBal>=0?'k-green':'k-red'}">${myBal>=0?'+':''}$${Math.abs(myBal).toFixed(2)}</div><div class="k-sub">${myBal>0?'you are owed':myBal<0?'you owe':'all even'}</div></div>
    <div class="kpi" data-icon="🔄"><div class="k-label">Pending</div><div class="k-val ${pend>0?'k-amber':'k-green'}">${pend}</div><div class="k-sub">transfers left</div></div>
    <div class="kpi" data-icon="👥"><div class="k-label">Members</div><div class="k-val k-purple">${data.members.length}</div><div class="k-sub">${data.activities.length} activities</div></div>
  </div>`;
}

// ── TABS ──
function rTabs() {
  return `<div class="tabs-wrap">
    ${[["dashboard","📊 Dashboard"],["expenses","💸 Expenses"],["settlements","🔄 Settle Up"],["members","👥 Members"]]
      .map(([id,l])=>`<button class="tab${tab===id?' active':''}" data-tab="${id}">${l}</button>`).join("")}
  </div>`;
}

// ── DASHBOARD ──
function rDash() {
  const byAct = {};
  data.activities.forEach(a=>byAct[a]=0);
  data.expenses.forEach(e=>{ byAct[e.activity]=(byAct[e.activity]||0)+e.amount; });
  const maxAct = Math.max(...Object.values(byAct), 1);

  const actRows = Object.entries(byAct).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1])
    .map(([n,v])=>`<div class="bal-row">
      <span class="bal-name">${ICONS[n]||'💰'} ${n}</span>
      <div class="bar-wrap"><div class="bar-fill" style="width:${(v/maxAct*100).toFixed(1)}%;background:var(--teal)"></div></div>
      <span class="bal-num k-teal">$${v.toFixed(2)}</span>
    </div>`).join("") || '<div class="empty" style="padding:20px 0"><p>No expenses yet</p></div>';

  const maxBal = Math.max(...data.members.map(m=>Math.abs(netBal(m,data.expenses))),1);
  const memRows = data.members.map(m=>{
    const b=netBal(m,data.expenses);
    return `<div class="bal-row">
      <span class="bal-name">${m}</span>
      <div class="bar-wrap"><div class="bar-fill" style="width:${(Math.abs(b)/maxBal*100).toFixed(1)}%;background:${b>=0?'var(--green)':'var(--danger)'}"></div></div>
      <span class="bal-num ${b>=0?'k-green':'k-red'}">${b>=0?'+':''}$${Math.abs(b).toFixed(2)}</span>
    </div>`;
  }).join("");

  const recent = [...data.expenses].reverse().slice(0,5);
  return `
    <div class="two-col">
      <div class="card"><div class="card-hd">📊 Spending by Activity</div>${actRows}</div>
      <div class="card"><div class="card-hd">👥 Member Balances</div>${memRows}</div>
    </div>
    <div class="card">
      <div class="card-hd">Recent Expenses <button class="btn btn-primary btn-sm" id="b-addexp">+ Add Expense</button></div>
      ${recent.length ? recent.map(rExpRow).join("") : '<div class="empty"><div class="empty-icon">💸</div><p>No expenses yet — add the first one!</p></div>'}
    </div>`;
}

// ── EXPENSES TAB ──
function rExpenses() {
  const fil = actFil==="All" ? data.expenses : data.expenses.filter(e=>e.activity===actFil);
  return `
    <div class="sec-hd"><div class="sec-title">All Expenses</div><button class="btn btn-primary btn-sm" id="b-addexp">+ Add Expense</button></div>
    <div class="pills">
      <div class="pill${actFil==="All"?" active":""}" data-af="All">All</div>
      ${data.activities.map(a=>`<div class="pill${actFil===a?" active":""}" data-af="${a}">${ICONS[a]||'💰'} ${a}</div>`).join("")}
      <div class="pill" style="border-style:dashed" id="b-addact">+ New Activity</div>
    </div>
    <div class="card">
      ${fil.length ? [...fil].reverse().map(rExpRow).join("") : '<div class="empty"><div class="empty-icon">💸</div><p>No expenses here yet</p></div>'}
    </div>`;
}

function rExpRow(e) {
  const pp = e.participants || data.members;
  const sh = (e.amount/pp.length).toFixed(2);
  return `<div class="exp-row">
    <div class="exp-icon">${ICONS[e.activity]||'💰'}</div>
    <div class="exp-body">
      <div class="exp-name">${e.description}<span class="exp-tag">${e.activity}</span></div>
      <div class="exp-meta">Paid by <strong>${e.paidBy}</strong> · ${e.date}</div>
      <div class="exp-meta">👥 ${pp.join(", ")}</div>
    </div>
    <div class="exp-right">
      <div class="exp-amount">$${(+e.amount).toFixed(2)}</div>
      <div class="exp-per">$${sh}/person</div>
      <button class="btn btn-danger btn-sm" style="margin-top:6px" data-del="${e.id}">✕ Remove</button>
    </div>
  </div>`;
}

// ── SETTLE TAB ──
function rSettle() {
  const txns = settle(data.expenses);
  const done = data.settled || [];
  if (!txns.length) return `<div class="card"><div class="empty"><div class="empty-icon">🎉</div><p>All settled! No transfers needed.</p></div></div>`;
  const pending = txns.filter(t=>!done.includes(t.from+">"+t.to));
  const settled = txns.filter(t=> done.includes(t.from+">"+t.to));
  return `
    <div class="card">
      <div class="card-hd">💸 Pending Transfers (${pending.length})</div>
      ${pending.map(t=>`<div class="settle-row">
        <span class="settle-from">${t.from}</span>
        <span class="settle-arrow">→</span>
        <span class="settle-to">${t.to}</span>
        <span class="settle-amt">$${t.amount.toFixed(2)}</span>
        <button class="btn btn-sm" style="background:rgba(61,184,116,.15);color:var(--green);border:1px solid rgba(61,184,116,.3)" data-settle="${t.from}>${t.to}">✓ Mark Done</button>
      </div>`).join("")}
      ${settled.length ? `<div class="divider"></div><div style="font-size:13px;color:var(--muted);margin-bottom:10px">Completed</div>
        ${settled.map(t=>`<div class="settle-row" style="opacity:.5">
          <span class="settle-from">${t.from}</span><span class="settle-arrow">→</span>
          <span class="settle-to">${t.to}</span>
          <span class="settle-amt">$${t.amount.toFixed(2)}</span>
          <span class="badge-done">✓ Done</span>
        </div>`).join("")}` : ""}
    </div>
    <div class="card">
      <div class="card-hd">📋 Breakdown by Activity</div>
      ${data.activities.map(act=>{
        const exps=data.expenses.filter(e=>e.activity===act);
        if(!exps.length) return "";
        return `<div style="margin-bottom:14px">
          <div style="font-weight:600;margin-bottom:6px">${ICONS[act]||'💰'} ${act} — $${exps.reduce((s,e)=>s+e.amount,0).toFixed(2)}</div>
          ${exps.map(e=>`<div class="exp-meta" style="margin-left:14px;margin-bottom:3px">• ${e.description}: $${(+e.amount).toFixed(2)} (${e.paidBy})</div>`).join("")}
        </div>`;
      }).join("")}
    </div>`;
}

// ── MEMBERS TAB ──
function rMembers() {
  return `
    <div class="card">
      <div class="card-hd">👥 Trip Members <button class="btn btn-primary btn-sm" id="b-addmem">+ Add Member</button></div>
      ${data.members.map(m=>{
        const b=netBal(m,data.expenses);
        const paid=data.expenses.filter(e=>e.paidBy===m).reduce((s,e)=>s+e.amount,0);
        return `<div class="bal-row">
          <div style="flex:1"><div class="bal-name">${m}</div><div class="exp-meta">Paid $${paid.toFixed(2)} total</div></div>
          <div style="text-align:right">
            <div class="bal-num ${b>=0?'k-green':'k-red'}" style="font-size:17px">${b>=0?'+':''}$${Math.abs(b).toFixed(2)}</div>
            <div class="exp-meta">${b>0?'to receive':b<0?'to pay':'settled'}</div>
          </div>
        </div>`;
      }).join("")}
    </div>`;
}

// ── MODALS ──
function rExpModal() {
  const today = new Date().toISOString().split("T")[0];
  const me    = user?.displayName || user?.email || "";
  return `<div class="overlay" id="ov">
    <div class="modal">
      <div class="modal-hd">➕ Add Expense <button class="x-btn" id="b-close">✕</button></div>
      <div class="form-grid">
        <div class="fg full"><label>Description *</label><input id="e-desc" placeholder="e.g. Boat ride to Flowerpot Island"/></div>
        <div class="fg"><label>Amount (CAD) *</label><input id="e-amt" type="number" placeholder="0.00" step="0.01" min="0"/></div>
        <div class="fg"><label>Date</label><input id="e-date" type="date" value="${today}"/></div>
        <div class="fg"><label>Paid By *</label>
          <select id="e-paid">
            ${data.members.map(m=>`<option value="${m}"${m===me?' selected':''}>${m}</option>`).join("")}
          </select>
        </div>
        <div class="fg"><label>Activity</label>
          <select id="e-act">${data.activities.map(a=>`<option>${a}</option>`).join("")}</select>
        </div>
        <div class="fg full"><label>Who's splitting this? (tap to toggle)</label>
          <div class="check-group" id="e-pp">
            ${data.members.map(m=>`<label class="check-chip on" data-m="${m}"><input type="checkbox" checked value="${m}"/>${m}</label>`).join("")}
          </div>
        </div>
        <div class="fg full"><label>Notes</label><textarea id="e-notes" placeholder="Optional notes…"></textarea></div>
        <div class="fg full"><button class="btn btn-primary" id="b-saveexp" style="width:100%;padding:13px;font-size:15px">Save Expense</button></div>
      </div>
    </div>
  </div>`;
}

function rActModal() {
  return `<div class="overlay" id="ov">
    <div class="modal" style="max-width:380px">
      <div class="modal-hd">🏷️ New Activity <button class="x-btn" id="b-close">✕</button></div>
      <div class="fg"><label>Activity Name</label><input id="a-name" placeholder="e.g. Fishing Charter"/></div>
      <button class="btn btn-primary" id="b-saveact" style="width:100%;margin-top:16px;padding:12px">Create Activity</button>
    </div>
  </div>`;
}

function rMemModal() {
  return `<div class="overlay" id="ov">
    <div class="modal" style="max-width:380px">
      <div class="modal-hd">👤 Add Member <button class="x-btn" id="b-close">✕</button></div>
      <div class="fg"><label>Full Name</label><input id="m-name" placeholder="e.g. Priya Sharma"/></div>
      <button class="btn btn-primary" id="b-savemem" style="width:100%;margin-top:16px;padding:12px">Add Member</button>
    </div>
  </div>`;
}

// ════════════════════════════════════════════
//  EVENT BINDING
// ════════════════════════════════════════════
function bindAuth() {
  document.getElementById("b-gsi")?.addEventListener("click", ()=>{
    signInWithPopup(auth, provider).catch(e=>{ console.error(e); toast("Sign-in error: "+e.code); });
  });
}

function bind() {
  // tabs
  document.querySelectorAll(".tab").forEach(t=>t.addEventListener("click",()=>{ tab=t.dataset.tab; render(); }));
  // activity filter pills
  document.querySelectorAll("[data-af]").forEach(p=>p.addEventListener("click",()=>{ actFil=p.dataset.af; render(); }));
  // open modals
  document.getElementById("b-addexp")?.addEventListener("click",()=>{ modal="expense"; render(); });
  document.getElementById("b-addact")?.addEventListener("click",()=>{ modal="activity"; render(); });
  document.getElementById("b-addmem")?.addEventListener("click",()=>{ modal="member"; render(); });
  // close modal
  document.getElementById("b-close")?.addEventListener("click",()=>{ modal=null; render(); });
  document.getElementById("ov")?.addEventListener("click",e=>{ if(e.target.id==="ov"){ modal=null; render(); } });
  // participant toggle
  document.querySelectorAll(".check-chip[data-m]").forEach(c=>{
    c.addEventListener("click",()=>{ c.classList.toggle("on"); c.querySelector("input").checked=c.classList.contains("on"); });
  });
  // save expense
  document.getElementById("b-saveexp")?.addEventListener("click",()=>{
    const desc=document.getElementById("e-desc").value.trim();
    const amt =parseFloat(document.getElementById("e-amt").value);
    const date=document.getElementById("e-date").value;
    const paid=document.getElementById("e-paid").value;
    const act =document.getElementById("e-act").value;
    const notes=document.getElementById("e-notes").value.trim();
    const pp  =[...document.querySelectorAll(".check-chip.on")].map(c=>c.dataset.m);
    if(!desc||isNaN(amt)||amt<=0){ toast("Enter description and amount"); return; }
    if(!pp.length){ toast("Select at least one participant"); return; }
    data.expenses.push({ id:Date.now().toString(), description:desc, amount:amt, date, paidBy:paid, activity:act, notes, participants:pp });
    modal=null;
    ghSave().then(()=>render());
  });
  // save activity
  document.getElementById("b-saveact")?.addEventListener("click",()=>{
    const n=document.getElementById("a-name").value.trim();
    if(!n){ toast("Enter activity name"); return; }
    if(!data.activities.includes(n)) data.activities.push(n);
    modal=null; ghSave().then(()=>render());
  });
  // save member
  document.getElementById("b-savemem")?.addEventListener("click",()=>{
    const n=document.getElementById("m-name").value.trim();
    if(!n){ toast("Enter a name"); return; }
    if(!data.members.includes(n)) data.members.push(n);
    modal=null; ghSave().then(()=>render());
  });
  // delete expense
  document.querySelectorAll("[data-del]").forEach(b=>b.addEventListener("click",()=>{
    data.expenses=data.expenses.filter(e=>e.id!==b.dataset.del);
    ghSave().then(()=>render());
  }));
  // mark settled
  document.querySelectorAll("[data-settle]").forEach(b=>b.addEventListener("click",()=>{
    if(!data.settled) data.settled=[];
    data.settled.push(b.dataset.settle);
    ghSave().then(()=>render());
  }));
  // sign out
  document.getElementById("b-out")?.addEventListener("click",()=>signOut(auth));
  document.getElementById("b-in-hdr")?.addEventListener("click",()=>{
    signInWithPopup(auth, provider).catch(e=>{ console.error(e); toast("Sign-in error: "+e.code); });
  });
}

// ════════════════════════════════════════════
//  AUTH STATE
// ════════════════════════════════════════════
onAuthStateChanged(auth, u => {
  user = u;
  if (u) ghLoad();
  else render();
});
</script>
</body>
</html>
